name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - name: Test
        run: ./gradlew test --stacktrace
      - name: Build sample fixture
        run: ./gradlew -p samples/kmp-build-fixture compileKotlinJvm
      - name: Verify plugin
        run: ./gradlew verifyPlugin --stacktrace
      - name: Build plugin
        run: ./gradlew buildPlugin
